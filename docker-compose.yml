services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: securecipher_user
      POSTGRES_PASSWORD: securecipher_password
      POSTGRES_DB: securecipher_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: "replace-with-strong-secret"
      DEBUG: "True"
      DB_NAME: securecipher_db
      DB_USER: securecipher_user
      DB_PASSWORD: securecipher_password
      DB_HOST: db
      DB_PORT: "5432"
      DB_SSLMODE: disable
    depends_on:
      - db
    ports:
      - "8001:8001"
    command: >
      sh -c "python manage.py migrate --noinput && \
             gunicorn bankingapi.wsgi:application --bind 0.0.0.0:8001"

  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: "replace-with-strong-secret"
      DEBUG: "True"
      DB_NAME: securecipher_db
      DB_USER: securecipher_user
      DB_PASSWORD: securecipher_password
      DB_HOST: db
      DB_PORT: "5432"
      DB_SSLMODE: disable
      LOCAL_DEV: "True"
      BANKING_API_BASE_URL: "http://server:8001"
    depends_on:
      - db
      - server
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput && \
             gunicorn middleware.wsgi:application --bind 0.0.0.0:8000"

volumes:
  db_data:
